name: Generate Stock Report

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Stock ticker symbol (e.g. NOVO-B)"
        required: true
        type: string

jobs:
  render:
    # ── Rocker image : R 4.3 + pandoc + tidyverse pré-installés ──────────────
    runs-on: ubuntu-latest
    container:
      image: rocker/tidyverse:4.3
    timeout-minutes: 30

    steps:
      # ── 1. Checkout finance_analysis (repo privé) ─────────────────────────
      - name: Checkout finance_analysis (private)
        uses: actions/checkout@v4
        with:
          path: finance_analysis

      # ── 2. Checkout finance_reports (repo public) ─────────────────────────
      - name: Checkout finance_reports (public)
        uses: actions/checkout@v4
        with:
          repository: blofg/finance_reports
          token: ${{ secrets.GH_PAT }}
          path: finance_reports

      # ── 3. Créer le dossier de destination s'il n'existe pas ──────────────
      - name: Ensure output directory exists
        run: mkdir -p finance_reports/reports/share/custom

      # ── 4. Cache des packages R ───────────────────────────────────────────
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/R/site-library
          key: rocker-r43-pkgs-${{ hashFiles('finance_analysis/initialization/package.R') }}
          restore-keys: |
            rocker-r43-pkgs-

      # ── 5. Installer les packages R manquants (skippé si cache hit) ───────
      - name: Install R packages
        run: |
          Rscript finance_analysis/initialization/package.R

      # ── 6. Copier le CSS dans le dossier output ───────────────────────────
      - name: Copy CSS to output directory
        run: |
          cp finance_analysis/html/style/style.css finance_reports/reports/share/custom/style.css

      # ── 7. Rendre le rapport ──────────────────────────────────────────────
      - name: Render report
        env:
          TICKER: ${{ github.event.inputs.ticker }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CI: "true"
        run: |
          Rscript -e "
            ticker   <- Sys.getenv('TICKER')
            cat('=== Rendering report for:', ticker, '===\n')

            path_main  <- file.path(getwd(), 'finance_analysis')
            output_dir <- file.path(getwd(), 'finance_reports', 'reports', 'share', 'custom')

            rmarkdown::render(
              input       = file.path(path_main, 'html', 'share_reports', 'custom_analysis', 'markdown', 'share_custom_analysis.Rmd'),
              output_file = paste0('stock_', ticker, '_report_html.html'),
              output_dir  = output_dir,
              params      = list(ticker = ticker, llm_analysis = FALSE),
              envir       = new.env(parent = globalenv())
            )

            cat('=== Render complete ===\n')
          "

      # ── 8. Commit & push du HTML dans finance_reports ─────────────────────
      - name: Commit and push report
        run: |
          cd finance_reports
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/share/custom/
          git diff --cached --quiet \
            && echo "Nothing to commit" \
            || git commit -m "report: add ${{ github.event.inputs.ticker }} $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
